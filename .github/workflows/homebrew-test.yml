name: Test Homebrew Tap

on:
  # Trigger this workflow on formula/workflow updates, a weekly health check,
  # or an explicit manual run.
  # Run when formula or workflow files change on main
  push:
    branches: [ main ]
    paths:
      - "Formula/*.rb"
      - ".github/workflows/homebrew-test.yml"

  # Run for pull requests that modify the formula
  pull_request:
    paths:
      - "Formula/*.rb"
      - ".github/workflows/homebrew-test.yml"

  # Run after the formula-update workflow finishes successfully on main.
  workflow_run:
    workflows: ["Update Formula"]
    types: [completed]

  # Run weekly to detect regressions (e.g. broken URLs, checksum issues)
  schedule:
    - cron: "0 3 * * 1" # Every Monday at 03:00 UTC

  # Allow manual execution from the GitHub UI
  workflow_dispatch:

permissions:
  # Read-only access is sufficient for install/test/audit checks.
  contents: read

concurrency:
  # Keep at most one run per ref to avoid redundant CI work.
  group: homebrew-test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Install, Test and Audit Formula
    if: github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: macos-latest
    timeout-minutes: 30
    env:
      # Speed up Homebrew commands by skipping implicit updates in this job.
      HOMEBREW_NO_AUTO_UPDATE: "1"
      # Prevent Homebrew from removing deps between steps in CI.
      HOMEBREW_NO_INSTALL_CLEANUP: "1"
      TAP_NAME: eschaar/vstack
      FORMULA_FULL_NAME: eschaar/vstack/vstack

    steps:
      # Step 1: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      # Step 2: Tap this repository locally
      # This makes the formula available without fetching from GitHub
      - name: Tap local repository
        run: |
          if brew tap | grep -qx "$TAP_NAME"; then
            brew untap "$TAP_NAME"
          fi
          brew tap "$TAP_NAME" "$GITHUB_WORKSPACE"

      # Step 3: Collect concise environment diagnostics
      # Keeps logs short while still showing Python/Homebrew context.
      - name: Diagnostic info
        run: |
          echo "::group::brew version"
          brew --version
          echo "::endgroup::"

          echo "::group::system python"
          python3 --version || true
          echo "::endgroup::"

          echo "::group::installed brew python"
          brew list --versions | grep -E '^python(@|$)' || true
          echo "::endgroup::"

      # Step 4: Install the formula
      # CI-only choice: include test dependencies so the formula's `test do` path
      # can be validated reliably. End users normally run plain `brew install`.
      - name: Install formula
        id: install
        run: brew install --include-test "$FORMULA_FULL_NAME"

      # Step 5: Run the formula's test block
      # Requires a valid `test do` block in the formula
      # Keep diagnostics available, then fail explicitly at the end when needed.
      - name: Run formula test
        id: test
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail

          # Track whether we had to use the CI fallback path.
          echo "used_fallback=false" >> "$GITHUB_OUTPUT"

          # In CI, `brew test` can sometimes report a missing python@X.Y test
          # dependency even when that dependency is installed. Keep a guarded
          # fallback for this known false-positive.

          echo "::group::python diagnostics before brew test"
          command -v python3 || true
          python3 --version || true
          brew list --versions | grep -E '^python(@|$)' || true
          echo "::endgroup::"

          # `brew test` validates the already installed formula keg.
          TEST_LOG="$(mktemp)"
          if brew test "$FORMULA_FULL_NAME" 2>&1 | tee "$TEST_LOG"; then
            exit 0
          fi

          # Fallback only for the known false-positive case where the reported
          # python dependency is actually installed in this runner.
          if grep -Eq 'missing test dependencies: .*python@[0-9]+\.[0-9]+' "$TEST_LOG"; then
            MISSING_PY_DEP="$(grep -Eo 'python@[0-9]+\.[0-9]+' "$TEST_LOG" | head -n1 || true)"
            if [[ -n "$MISSING_PY_DEP" ]] && brew list --versions "$MISSING_PY_DEP" >/dev/null 2>&1; then
              echo "::warning::brew test reported missing $MISSING_PY_DEP in CI, but it is installed; running fallback smoke test."
              if command -v vstack >/dev/null 2>&1; then
                vstack --help >/dev/null
              else
                "$(brew --prefix)/bin/vstack" --help >/dev/null
              fi
              echo "used_fallback=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          exit 1

      # Step 6: Audit the formula against Homebrew standards
      # Ensures compliance with best practices and policies
      - name: Audit formula
        id: audit
        run: brew audit --strict --online "$FORMULA_FULL_NAME"

      # Step 7: Generate job summary with test status
      - name: Add job summary
        if: always()
        run: |
          {
            echo "## Homebrew Formula Test Summary"
            echo ""
            echo "| Check | Status |"
            echo "|-------|--------|"
            if [[ "${{ steps.install.outcome }}" == "success" ]]; then
              echo "| Install | ✅ Passed |"
            else
              echo "| Install | ❌ Failed |"
            fi
            if [[ "${{ steps.test.outcome }}" == "success" ]]; then
              echo "| Test | ✅ Passed |"
            else
              echo "| Test | ❌ Failed |"
            fi
            if [[ "${{ steps.audit.outcome }}" == "success" ]]; then
              echo "| Audit | ✅ Passed |"
            else
              echo "| Audit | ❌ Failed |"
            fi
            echo ""
            if [[ "${{ steps.test.outputs.used_fallback }}" == "true" ]]; then
              echo "ℹ️ **Test note:** `brew test` hit the known CI python dependency false-positive; fallback smoke test passed."
              echo ""
            fi
            if [[ "${{ steps.test.outcome }}" == "failure" ]]; then
              echo "❌ **Note:** The formula test step failed and the workflow is marked failed below. See logs for details."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      # Step 8: Mark workflow failed when `brew test` failed
      # Keep `continue-on-error` on the test step for diagnostics and summary,
      # but fail the overall job explicitly at the end.
      - name: Fail workflow on test failure
        if: steps.test.outcome == 'failure'
        run: |
          echo "::error::brew test failed; see 'Run formula test' step output."
          exit 1
