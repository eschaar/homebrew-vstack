name: Update Formula

on:
  # Supports both trusted release automation and operator-driven manual updates.
  repository_dispatch:
    types: [update-formula]
  workflow_dispatch:
    inputs:
      version:
        description: "Version (X.Y.Z)"
        required: true
      sdist_url:
        description: "PyPI sdist URL"
        required: true
      sha256:
        description: "SHA256 of sdist"
        required: true
      python_version:
        description: "Homebrew Python version"
        type: choice
        options:
          - python@3.11
          - python@3.12
          - python@3.13
          - python@3.14
        required: false
        default: "python@3.13"

permissions:
  # Required to commit and push formula updates back to main.
  contents: write

jobs:
  update-formula:
    # macOS provides a stable Homebrew environment for resource generation.
    runs-on: macos-latest
    env:
      TAP_NAME: eschaar/vstack
      FORMULA_FULL_NAME: eschaar/vstack/vstack
      FORMULA_FILE: Formula/vstack.rb
      DEFAULT_PYTHON_VERSION: python@3.13
      ALLOWED_PYTHON_VERSIONS: "python@3.11 python@3.12 python@3.13 python@3.14"
      PYPI_HOST_PREFIX: https://files.pythonhosted.org/
      VERSION_REGEX: "[0-9]+\\.[0-9]+\\.[0-9]+"
      SHA256_REGEX: "[a-f0-9]{64}"
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      # Normalize and validate payload fields from either dispatch or manual input.
      - name: Resolve payload
        id: payload
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PAYLOAD_JSON: ${{ toJson(github.event.client_payload) }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_SDIST_URL: ${{ inputs.sdist_url }}
          INPUT_SHA256: ${{ inputs.sha256 }}
          INPUT_PYTHON_VERSION: ${{ inputs.python_version }}
          HOMEBREW_TAP_DISPATCH_SECRET: ${{ secrets.HOMEBREW_TAP_DISPATCH_SECRET }}
        run: |
          python - <<'PY'
          """Validate dispatch/manual inputs and emit normalized workflow outputs."""

          import json
          import hashlib
          import os
          import re
          import sys
          from urllib.error import HTTPError, URLError
          from urllib.request import Request, urlopen

          event = os.environ["EVENT_NAME"]

          if event == "repository_dispatch":
              payload = json.loads(os.environ.get("PAYLOAD_JSON") or "{}")
              version = payload.get("version", "")
              sdist_url = payload.get("sdist_url", "")
              sha256 = payload.get("sha256", "")
              python_version = payload.get("python_version", os.environ.get("DEFAULT_PYTHON_VERSION", ""))
              signature = payload.get("signature", "")

              secret = os.environ.get("HOMEBREW_TAP_DISPATCH_SECRET", "")
              if not secret:
                  print("ERROR: missing HOMEBREW_TAP_DISPATCH_SECRET in tap repository secrets", file=sys.stderr)
                  sys.exit(1)

              if not signature:
                  print("ERROR: missing signature in dispatch payload", file=sys.stderr)
                  sys.exit(1)

              import hmac
              from hashlib import sha256 as sha256_func
              canonical_obj = {
                  "sha256": sha256,
                  "sdist_url": sdist_url,
                  "version": version,
              }
              canonical = json.dumps(canonical_obj, separators=(",", ":"), sort_keys=True)
              expected = hmac.new(secret.encode("utf-8"), canonical.encode("utf-8"), sha256_func).hexdigest()
              if not hmac.compare_digest(signature, expected):
                  print("ERROR: invalid payload signature", file=sys.stderr)
                  sys.exit(1)
          else:
              version = os.environ.get("INPUT_VERSION", "")
              sdist_url = os.environ.get("INPUT_SDIST_URL", "")
              sha256 = os.environ.get("INPUT_SHA256", "")
              python_version = os.environ.get("INPUT_PYTHON_VERSION", os.environ.get("DEFAULT_PYTHON_VERSION", ""))

          if not re.fullmatch(os.environ.get("VERSION_REGEX", r"[0-9]+\.[0-9]+\.[0-9]+"), version):
              print(f"ERROR: invalid version '{version}'", file=sys.stderr)
              sys.exit(1)

          if not sdist_url.startswith(os.environ.get("PYPI_HOST_PREFIX", "https://files.pythonhosted.org/")):
              print("ERROR: sdist_url must point to files.pythonhosted.org", file=sys.stderr)
              sys.exit(1)

          sdist_match = re.search(r"/[^/]+-([0-9]+\.[0-9]+\.[0-9]+)\.tar\.gz$", sdist_url)
          if not sdist_match:
              print("ERROR: sdist_url must end with '<package>-X.Y.Z.tar.gz'", file=sys.stderr)
              sys.exit(1)

          sdist_version = sdist_match.group(1)
          if sdist_version != version:
              print(
                  f"ERROR: version mismatch: input version is '{version}' but sdist_url contains '{sdist_version}'",
                  file=sys.stderr,
              )
              sys.exit(1)

          if not re.fullmatch(os.environ.get("SHA256_REGEX", r"[a-f0-9]{64}"), sha256):
              print("ERROR: sha256 must be a 64-character lowercase hex string", file=sys.stderr)
              sys.exit(1)

          # Ensure the provided sdist URL is reachable and matches the claimed SHA256.
          try:
              request = Request(sdist_url, headers={"User-Agent": "homebrew-vstack-formula-update"})
              digest = hashlib.sha256()
              with urlopen(request, timeout=30) as response:
                  while True:
                      chunk = response.read(1024 * 1024)
                      if not chunk:
                          break
                      digest.update(chunk)
          except HTTPError as exc:
              print(f"ERROR: sdist_url returned HTTP {exc.code}: {sdist_url}", file=sys.stderr)
              sys.exit(1)
          except URLError as exc:
              print(f"ERROR: could not download sdist_url: {exc.reason}", file=sys.stderr)
              sys.exit(1)
          except Exception as exc:
              print(f"ERROR: failed to validate sdist_url: {exc}", file=sys.stderr)
              sys.exit(1)

          downloaded_sha256 = digest.hexdigest()
          if downloaded_sha256 != sha256:
              print(
                  "ERROR: sha256 mismatch for sdist_url: "
                  + f"expected {sha256}, got {downloaded_sha256}",
                  file=sys.stderr,
              )
              sys.exit(1)

          allowed_python_versions = set(os.environ.get("ALLOWED_PYTHON_VERSIONS", "").split())
          if python_version not in allowed_python_versions:
              print(
                  "ERROR: python_version must be one of: "
                  + ", ".join(sorted(allowed_python_versions)),
                  file=sys.stderr,
              )
              sys.exit(1)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"version={version}\n")
              fh.write(f"sdist_url={sdist_url}\n")
              fh.write(f"sha256={sha256}\n")
              fh.write(f"python_version={python_version}\n")
          PY

      # Validate that the resolved Python version is available in Homebrew.
      - name: Validate Python version availability
        env:
          PYTHON_VERSION: ${{ steps.payload.outputs.python_version }}
        run: |
          if ! brew info "$PYTHON_VERSION" > /dev/null 2>&1; then
            echo "ERROR: Python version '$PYTHON_VERSION' is not available in Homebrew."
            echo "Allowed versions: $ALLOWED_PYTHON_VERSIONS"
            echo "Available Python versions in Homebrew:"
            brew search "^python@" || true
            exit 1
          fi
          echo "✓ Python version '$PYTHON_VERSION' is available."

      # Make selected values explicit in logs for troubleshooting manual/dispatch runs.
      - name: Show resolved inputs
        run: |
          echo "Resolved version: ${{ steps.payload.outputs.version }}"
          echo "Resolved sdist_url: ${{ steps.payload.outputs.sdist_url }}"
          echo "Resolved sha256: ${{ steps.payload.outputs.sha256 }}"
          echo "Resolved python_version: ${{ steps.payload.outputs.python_version }}"

      # Write a clean base formula. Python resources are injected in later steps.
      - name: Rewrite formula
        shell: bash
        run: |
          cat > Formula/vstack.rb <<RUBY
          class Vstack < Formula
            include Language::Python::Virtualenv

            desc "VS Code-native AI engineering workflow system"
            homepage "https://github.com/eschaar/vstack"
            url "${{ steps.payload.outputs.sdist_url }}"
            sha256 "${{ steps.payload.outputs.sha256 }}"
            license "MIT"

            depends_on "${{ steps.payload.outputs.python_version }}"

            def install
              virtualenv_install_with_resources
            end

            test do
              # Run through the formula virtualenv Python to avoid relying on system Python.
              venv_python = libexec/"bin/python3"
              output = shell_output("#{venv_python} #{bin}/vstack --help")
              assert_match(/usage:/i, output)
            end
          end
          RUBY

      # Ensure the workflow now operates on this repository's updated tap contents.
      - name: Tap local repository
        run: |
          if brew tap | grep -qx "$TAP_NAME"; then
            brew untap "$TAP_NAME"
          fi
          brew tap "$TAP_NAME" "$GITHUB_WORKSPACE"

      # brew tap clones from git history; copy rewritten formula so tap sees current run inputs.
      - name: Sync rewritten formula to tapped repository
        shell: bash
        run: |
          tap_formula="$(brew --repository "$TAP_NAME")/$FORMULA_FILE"
          cp "$FORMULA_FILE" "$tap_formula"

      # Populate Python dependencies from package metadata (PyPI).
      - name: Auto-generate Python resources
        shell: bash
        env:
          PYTHON_VERSION: ${{ steps.payload.outputs.python_version }}
          VERSION: ${{ steps.payload.outputs.version }}
        run: |
          # Ensure the target Python version is installed in Homebrew's environment
          brew install "$PYTHON_VERSION"
          # Generate resources using the resolved Python version from the formula.
          # Freshly published PyPI releases can hit Homebrew's 24h cooldown guard.
          set +e
          brew update-python-resources "$FORMULA_FULL_NAME" 2>&1 | tee update-python-resources.log
          update_exit=$?
          set -e

          if [[ $update_exit -eq 0 ]]; then
          exit 0
          fi

          if ! grep -q -- '--uploaded-prior-to=' update-python-resources.log; then
          echo "ERROR: update-python-resources failed for a non-cooldown reason."
          cat update-python-resources.log
          exit $update_exit
          fi

          echo "Detected Homebrew PyPI cooldown failure. Falling back to pip report resource generation."

          BREW_PYTHON="$(brew --prefix "$PYTHON_VERSION")/libexec/bin/python"
          if [[ ! -x "$BREW_PYTHON" ]]; then
            BREW_PYTHON="$(brew --prefix "$PYTHON_VERSION")/bin/python3"
          fi
          if [[ ! -x "$BREW_PYTHON" ]]; then
            echo "ERROR: Could not find executable Python for $PYTHON_VERSION"
            exit 1
          fi
          "$BREW_PYTHON" - <<'PY'
          """Generate formula resource blocks from pip --report output as cooldown fallback."""

          from __future__ import annotations

          import json
          import os
          import re
          import subprocess
          import sys
          from pathlib import Path

          package_name = "vstack"
          version = os.environ["VERSION"]
          formula_path = Path(os.environ.get("FORMULA_FILE", "Formula/vstack.rb"))

          pip_cmd = [
            sys.executable,
            "-m",
            "pip",
            "install",
            "-q",
            "--disable-pip-version-check",
            "--dry-run",
            "--ignore-installed",
            "--no-binary=:all:",
            "--report=/dev/stdout",
            f"{package_name}=={version}",
          ]

          proc = subprocess.run(pip_cmd, capture_output=True, text=True)
          if proc.returncode != 0:
            print("ERROR: pip report fallback failed", file=sys.stderr)
            print(proc.stderr or proc.stdout, file=sys.stderr)
            sys.exit(proc.returncode)

          report = json.loads(proc.stdout)

          def normalize(name: str) -> str:
            return re.sub(r"[-_.]+", "-", name).lower()

          resources: dict[str, tuple[str, str]] = {}
          for item in report.get("install", []):
            metadata = item.get("metadata") or {}
            download_info = item.get("download_info") or {}
            archive_info = download_info.get("archive_info") or {}
            hashes = archive_info.get("hashes") or {}

            name = metadata.get("name")
            if not name:
              continue

            normalized = normalize(name)
            if normalized == package_name:
              continue

            url = download_info.get("url")
            sha256 = hashes.get("sha256")

            if not url or not sha256:
              print(f"ERROR: missing url/sha256 for dependency '{name}'", file=sys.stderr)
              sys.exit(1)

            resources[normalized] = (url, sha256)

          ordered = sorted(resources.items())
          blocks = []
          for name, (url, sha256) in ordered:
            blocks.append(
              "\n".join(
                [
                  f'  resource "{name}" do',
                  f'    url "{url}"',
                  f'    sha256 "{sha256}"',
                  "  end",
                ]
              )
            )

          text = formula_path.read_text(encoding="utf-8")
          # Remove any pre-existing resource blocks, then inject fresh ones.
          text = re.sub(
            r"\n  resource \"[^\"]+\" do\n(?:    .*\n)*?  end\n",
            "\n",
            text,
            flags=re.MULTILINE,
          )

          resource_section = "\n\n".join(blocks)
          if resource_section:
            text = text.replace("\n\n  def install\n", f"\n\n{resource_section}\n\n  def install\n", 1)

          formula_path.write_text(text, encoding="utf-8")
          print(f"Generated {len(ordered)} resource block(s) via pip fallback.")
          PY

          # Keep tapped formula aligned after fallback edits.
          tap_formula="$(brew --repository "$TAP_NAME")/$FORMULA_FILE"
          cp "$FORMULA_FILE" "$tap_formula"

      # update-python-resources edits the tapped formula path; copy it back to repo workspace.
      - name: Sync generated formula back to workspace
        shell: bash
        run: |
          tap_formula="$(brew --repository "$TAP_NAME")/$FORMULA_FILE"
          cp "$tap_formula" "$FORMULA_FILE"

      # Parse audit guidance and add missing native library dependencies automatically.
      - name: Sync native dependencies from audit hints
        shell: bash
        run: |
          # Re-run audit up to 3 times so newly suggested native deps are applied iteratively.
          for attempt in 1 2 3; do
            echo "Audit pass ${attempt}/3"
            set +e
            brew audit --strict "$FORMULA_FULL_NAME" > audit.log 2>&1
            audit_exit=$?
            set -e

            if [[ $audit_exit -eq 0 ]]; then
              echo "Audit passed on pass ${attempt}."
              break
            fi

            echo "Audit hints from pass ${attempt}:"
            grep -E 'Add `depends_on` lines above for' audit.log || true

            applied_count="$(python - <<'PY'
          """Apply audit-suggested depends_on entries and de-duplicate dependency lines."""

          import os
          import re
          from pathlib import Path

          formula_path = Path(os.environ.get("FORMULA_FILE", "Formula/vstack.rb"))
          audit_log = Path("audit.log")

          text = formula_path.read_text(encoding="utf-8")
          audit_output = audit_log.read_text(encoding="utf-8") if audit_log.exists() else ""

          # Parse hints like: for "libyaml". and for `"libyaml"`.
          needed_libs = sorted(
              set(re.findall(r'Add `depends_on` lines above for `?"([^"]+)"`?\.', audit_output))
          )

          missing_libs = [lib for lib in needed_libs if f'depends_on "{lib}"' not in text]
          if missing_libs:
              dep_block = "".join(f'  depends_on "{lib}"\n' for lib in missing_libs)
              text = text.replace('license "MIT"\n\n', f'license "MIT"\n\n{dep_block}', 1)

          # De-duplicate depends_on lines while preserving order.
          out_lines = []
          seen_dep_lines = set()
          for line in text.splitlines():
              if line.strip().startswith('depends_on "'):
                  if line in seen_dep_lines:
                      continue
                  seen_dep_lines.add(line)
              out_lines.append(line)

          formula_path.write_text("\n".join(out_lines) + "\n", encoding="utf-8")
          print(len(missing_libs))
          PY
            )"

            # Keep tapped formula aligned with workspace edits before next pass.
            tap_formula="$(brew --repository "$TAP_NAME")/$FORMULA_FILE"
            cp "$FORMULA_FILE" "$tap_formula"

            if [[ "$applied_count" == "0" ]]; then
              echo "No auto-fixable dependency hints found; failing with current audit output."
              cat audit.log
              exit $audit_exit
            fi
          done

          echo "Final strict audit after applying hints:"
          brew audit --strict "$FORMULA_FULL_NAME"

      # Keep generated resources visible in job logs for troubleshooting and reviews.
      - name: Show generated resources
        shell: bash
        run: |
          echo "Generated resource blocks in $FORMULA_FILE:"
          grep -n '^  resource \|^    url \|^    sha256 ' "$FORMULA_FILE" || true

      # Commit formula updates back to main when generated output differs.
      - name: Commit and push
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add "$FORMULA_FILE"
          if git diff --cached --quiet; then
            echo "No formula changes to commit"
            exit 0
          fi
          git commit -m "chore(formula): update vstack ${VERSION}"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.payload.outputs.version }}
