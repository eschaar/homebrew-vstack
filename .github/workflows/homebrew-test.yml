name: Test Homebrew Tap

on:
  # Trigger this workflow on formula/workflow updates, a weekly health check,
  # or an explicit manual run.
  # Run when formula or workflow files change on main
  push:
    branches: [ main ]
    paths:
      - "Formula/*.rb"
      - ".github/workflows/homebrew-test.yml"

  # Run for pull requests that modify the formula
  pull_request:
    paths:
      - "Formula/*.rb"
      - ".github/workflows/homebrew-test.yml"

  # Run after the formula-update workflow finishes successfully on main.
  workflow_run:
    workflows: ["Update Formula"]
    types: [completed]

  # Run weekly to detect regressions (e.g. broken URLs, checksum issues)
  schedule:
    - cron: "0 3 * * 1" # Every Monday at 03:00 UTC

  # Allow manual execution from the GitHub UI
  workflow_dispatch:

permissions:
  # Read-only access is sufficient for install/test/audit checks.
  contents: read

concurrency:
  # Keep at most one run per ref to avoid redundant CI work.
  group: homebrew-test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Install, Test and Audit Formula
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: macos-latest
    env:
      # Speed up Homebrew commands by skipping implicit updates in this job.
      HOMEBREW_NO_AUTO_UPDATE: "1"
      # Prevent Homebrew from removing deps between steps in CI.
      HOMEBREW_NO_INSTALL_CLEANUP: "1"
      TAP_NAME: eschaar/vstack
      FORMULA_FULL_NAME: eschaar/vstack/vstack
      FORMULA_FILE: Formula/vstack.rb

    steps:
      # Step 1: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      # Step 2: Tap this repository locally
      # This makes the formula available without fetching from GitHub
      - name: Tap local repository
        run: |
          if brew tap | grep -qx "$TAP_NAME"; then
            brew untap "$TAP_NAME"
          fi
          brew tap "$TAP_NAME" "$GITHUB_WORKSPACE"

      # Step 3: Collect concise environment diagnostics
      # Keeps logs short while still showing Python/Homebrew context.
      - name: Diagnostic info
        run: |
          echo "::group::brew version"
          brew --version
          echo "::endgroup::"

          echo "::group::system python"
          python3 --version || true
          echo "::endgroup::"

          echo "::group::installed brew python"
          brew list --versions | grep -E '^python(@|$)' || true
          echo "::endgroup::"

      # Step 4: Install the formula
      # Install with test dependencies so `brew test` uses the same install context.
      - name: Install formula
        run: brew install --include-test "$FORMULA_FULL_NAME"

      # Step 5: Run the formula's test block
      # Requires a valid `test do` block in the formula
      # Non-critical: allow workflow to continue even if test fails.
      - name: Run formula test
        id: test
        continue-on-error: true
        shell: bash
        run: |
          # brew reinstall can drop include-test context; do a clean install with test deps.
          if brew list --formula | grep -qx "$(basename "$FORMULA_FULL_NAME")"; then
            brew uninstall --force "$FORMULA_FULL_NAME"
          fi
          brew install --include-test "$FORMULA_FULL_NAME"
          brew test "$FORMULA_FULL_NAME"

      # Step 6: Audit the formula against Homebrew standards
      # Ensures compliance with best practices and policies
      - name: Audit formula
        run: brew audit --strict --online "$FORMULA_FULL_NAME"

      # Step 7: Generate job summary with test status
      - name: Add job summary
        run: |
          {
            echo "## Homebrew Formula Test Summary"
            echo ""
            echo "| Check | Status |"
            echo "|-------|--------|"
            echo "| Install | ✅ Passed |"
            if [[ "${{ steps.test.outcome }}" == "success" ]]; then
              echo "| Test | ✅ Passed |"
            else
              echo "| Test | ⚠️ Failed (non-blocking) |"
            fi
            echo "| Audit | ✅ Passed |"
            echo ""
            if [[ "${{ steps.test.outcome }}" == "failure" ]]; then
              echo "⚠️ **Note:** The formula test step failed, but the workflow continued. See logs for details."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      # Step 8: Create GitHub Issue if test failed
      - name: Create issue on test failure
        if: failure() && steps.test.outcome == 'failure'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ Homebrew formula test failed',
              body: `The \`brew test\` step failed in the [test workflow run](${context.payload.repository.html_url}/actions/runs/${context.runId}).\n\nThis is a non-blocking issue, but should be investigated.\n\n**Details:**\n- Formula: eschaar/vstack/vstack\n- Runner: macos-latest\n- Trigger: ${context.eventName}`,
              labels: ['bug', 'homebrew', 'ci']
            })
